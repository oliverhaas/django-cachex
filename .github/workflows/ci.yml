name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run mypy check
        run: uv run mypy django_cachex/

      - name: Run ty check
        run: uv run ty check django_cachex/

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14"
        django-version:
          - "6.0"
        client-library-version:
          - "latest"

        include:
          # Pre-release client libraries (redis-py master, valkey-py main)
          - python-version: "3.14"
            django-version: "6.0"
            client-library-version: "dev"

          # Pre-release Django
          - python-version: "3.14"
            django-version: "main"
            client-library-version: "latest"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Django ${{ matrix.django-version }}
        run: |
          if [ "${{ matrix.django-version }}" = "main" ]; then
            uv pip install "Django @ git+https://github.com/django/django.git@main"
          else
            uv pip install "Django~=${{ matrix.django-version }}.0"
          fi

      - name: Install pre-release client libraries
        if: matrix.client-library-version == 'dev'
        run: |
          uv pip install "redis @ git+https://github.com/redis/redis-py.git@master"
          uv pip install "valkey @ git+https://github.com/valkey-io/valkey-py.git@main"

      - name: Run backend tests
        run: uv run pytest tests/cache/ -n auto

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.django-version == '6.0' && matrix.client-library-version == 'latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Django
        run: uv pip install "Django~=6.0.0"

      - name: Run admin tests
        run: uv run pytest tests/admin/ -n auto

  test-unfold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies with unfold
        run: uv sync --group dev --extra unfold

      - name: Install Django
        run: uv pip install "Django~=6.0.0"

      - name: Run unfold tests
        run: uv run pytest tests/admin/ -n auto
        env:
          DJANGO_SETTINGS_MODULE: settings.unfold

  build-wheels:
    name: Build wheels (cibuildwheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_BUILD: cp314-manylinux_x86_64 cp314t-manylinux_x86_64
          CIBW_ENABLE: cpython-freethreading
          CIBW_ARCHS_LINUX: x86_64
          CIBW_BEFORE_BUILD_LINUX: |
            curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/*.whl

  test-wheel:
    name: Test against built wheel
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dev environment
        run: uv sync --group dev

      - name: Replace source build with cibuildwheel artifact
        run: uv pip install --force-reinstall --no-deps wheelhouse/django_cachex-*-cp314-cp314-*.whl

      - name: Run cache tests against built wheel
        run: uv run --no-sync pytest tests/cache/ -n auto
