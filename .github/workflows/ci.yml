name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev --extra orjson

      - name: Run ruff check
        run: uv run ruff check

      - name: Run ruff format check
        run: uv run ruff format --check

      - name: Run mypy check
        run: uv run mypy django_cachex/

      - name: Run ty check
        run: uv run ty check django_cachex/

  test-backend:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14"
        django-version:
          - "6.0"
        client-library-version:
          - "latest"

        include:
          # Pre-release client libraries (redis-py master, valkey-py main)
          - python-version: "3.14"
            django-version: "6.0"
            client-library-version: "dev"

          # Pre-release Django
          - python-version: "3.14"
            django-version: "main"
            client-library-version: "latest"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev --extra orjson

      - name: Install Django ${{ matrix.django-version }}
        run: |
          if [ "${{ matrix.django-version }}" = "main" ]; then
            uv pip install "Django @ git+https://github.com/django/django.git@main"
          else
            uv pip install "Django~=${{ matrix.django-version }}.0"
          fi

      - name: Install pre-release client libraries
        if: matrix.client-library-version == 'dev'
        run: |
          uv pip install "redis @ git+https://github.com/redis/redis-py.git@master"
          uv pip install "valkey @ git+https://github.com/valkey-io/valkey-py.git@main"

      - name: Run backend tests
        run: uv run pytest tests/cache/ -n auto

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.django-version == '6.0' && matrix.client-library-version == 'latest'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  test-rust:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.14"
          - "3.14t"
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run rust async-bridge tests
        run: uv run pytest tests/rust/ -v

  test-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install Django
        run: uv pip install "Django~=6.0.0"

      - name: Run admin tests
        run: uv run pytest tests/admin/ -n auto

  build-pure-wheel:
    name: Build pure-Python wheel (django-cachex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Build wheel + sdist
        run: uv build --out-dir wheelhouse/

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-pure
          path: wheelhouse/*

  build-rust-wheels:
    name: Build Rust wheels (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            cibw_archs: x86_64
            cibw_build: cp314-manylinux_x86_64 cp314t-manylinux_x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            cibw_archs: aarch64
            cibw_build: cp314-manylinux_aarch64 cp314t-manylinux_aarch64
          - os: macos-14
            label: macos-arm64
            cibw_archs: arm64
            cibw_build: cp314-macosx_arm64 cp314t-macosx_arm64
          - os: windows-latest
            label: windows-amd64
            cibw_archs: AMD64
            cibw_build: cp314-win_amd64 cp314t-win_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: crates/django-cachex-redis-rs
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ENABLE: cpython-freethreading
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          # Linux builds run inside manylinux containers — install Rust there.
          # macOS and Windows runners have rustup preinstalled.
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-rust-${{ matrix.label }}
          path: wheelhouse/*.whl

  test-wheel:
    name: Test wheels (pure + rust on cp314)
    needs: [build-pure-wheel, build-rust-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: wheels-pure
          path: wheelhouse

      - uses: actions/download-artifact@v4
        with:
          name: wheels-rust-linux-x86_64
          path: wheelhouse

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dev dependencies (without project)
        run: uv sync --group dev --no-install-project

      - name: Install both wheels (opt-in path)
        run: |
          uv pip install --no-deps wheelhouse/django_cachex-*-py3-none-any.whl
          uv pip install --no-deps wheelhouse/django_cachex_rust-*-cp314-cp314-*.whl

      - name: Run cache tests against built wheels
        run: uv run --no-sync pytest tests/cache/ -n auto

  smoke-test-wheel-freethreaded:
    name: Smoke-test cp314t rust wheel
    needs: [build-pure-wheel, build-rust-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-pure
          path: wheelhouse

      - uses: actions/download-artifact@v4
        with:
          name: wheels-rust-linux-x86_64
          path: wheelhouse

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up free-threaded Python
        run: uv python install 3.14t

      - name: Create venv and install both wheels
        run: |
          uv venv --python 3.14t
          uv pip install --no-deps wheelhouse/django_cachex-*-py3-none-any.whl django asgiref sqlparse
          uv pip install --no-deps wheelhouse/django_cachex_rust-*-cp314-cp314t-*.whl

      - name: Verify FT wheel imports
        run: uv run --no-sync python -c "import sys; from django_cachex import _driver; assert not sys._is_gil_enabled(), 'GIL is enabled — not running on free-threaded build'; print('OK', _driver, sys.version)"

  smoke-test-pure-only:
    name: Smoke-test opt-out (pure wheel only, no rust package)
    needs: build-pure-wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-pure
          path: wheelhouse

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Create venv and install pure wheel ONLY
        run: |
          uv venv --python 3.14
          uv pip install --no-deps wheelhouse/django_cachex-*-py3-none-any.whl django asgiref sqlparse

      - name: Verify imports succeed and Rust backends raise on use
        run: |
          uv run --no-sync python -c "
          import django_cachex
          import django_cachex.cache, django_cachex.client
          from django_cachex.cache import RedisRsCache, ValkeyCache
          try:
              from django_cachex import _driver
              raise SystemExit('FAIL: _driver present in pure-only install')
          except ImportError:
              pass
          rust = RedisRsCache(server='valkey://localhost:6379/0', params={'OPTIONS': {}})
          try:
              rust.get('foo')
              raise SystemExit('FAIL: rust backend should have raised')
          except ImportError as e:
              assert 'Rust driver is not available' in str(e), e
          print('OK: opt-out path works')
          "
