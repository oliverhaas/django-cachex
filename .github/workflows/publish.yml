name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.4.0)"
        required: true

jobs:
  build-pure-wheel:
    name: Build pure-Python wheel + sdist (django-cachex)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.14

      - name: Build wheel + sdist
        run: uv build --out-dir dist/

      - uses: actions/upload-artifact@v7
        with:
          name: dist-pure
          path: dist/*

  build-rust-wheels:
    name: Build Rust wheels (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            cibw_archs: x86_64
            cibw_build: cp314-manylinux_x86_64 cp314t-manylinux_x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            cibw_archs: aarch64
            cibw_build: cp314-manylinux_aarch64 cp314t-manylinux_aarch64
          - os: macos-14
            label: macos-arm64
            cibw_archs: arm64
            cibw_build: cp314-macosx_arm64 cp314t-macosx_arm64
          - os: windows-latest
            label: windows-amd64
            cibw_archs: AMD64
            cibw_build: cp314-win_amd64 cp314t-win_amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.version && format('v{0}', github.event.inputs.version) || github.ref }}

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        with:
          package-dir: crates/django-cachex-redis-rs
        env:
          CIBW_BUILD: ${{ matrix.cibw_build }}
          CIBW_ENABLE: cpython-freethreading
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto =https --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          CIBW_ENVIRONMENT_LINUX: PATH="$HOME/.cargo/bin:$PATH"

      # sdist is a single artifact — only build it once on the Linux x86_64 leg.
      - name: Build Rust sdist
        if: matrix.label == 'linux-x86_64'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path crates/django-cachex-redis-rs/Cargo.toml --out wheelhouse/

      - uses: actions/upload-artifact@v7
        with:
          name: dist-rust-${{ matrix.label }}
          path: wheelhouse/*

  publish-pure:
    needs: [build-pure-wheel, build-rust-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/django-cachex/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-pure
          path: dist

      - name: Publish django-cachex to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-rust:
    needs: [build-pure-wheel, build-rust-wheels]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/django-cachex-redis-rs/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: dist-rust-*
          path: dist
          merge-multiple: true

      - name: Publish django-cachex-redis-rs to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
